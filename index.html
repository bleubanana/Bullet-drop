const G1=[

  [.9,.2395],[.95,.2728],[1,.3049],[1.05,.3733],[1.1,.4064],[1.15,.4132],
  [1.2,.3945],[1.25,.3782],[1.3,.3617],[1.4,.3349],[1.5,.3149],[1.6,.2999],
  [1.8,.2742],[2,.2547],[2.2,.2407],[2.4,.2297],[2.6,.22],[2.8,.2118],[3,.2048],
];

function getCD(mach){
  if(mach<=G1[0][0]) return G1[0][1];
  for(let i=1;i<G1.length;i++){
    if(mach<=G1[i][0]){
      const f=(mach-G1[i-1][0])/(G1[i][0]-G1[i-1][0]);
      return G1[i-1][1]+f*(G1[i][1]-G1[i-1][1]);
    }
  }
  return G1[G1.length-1][1];
}

function simulate(bc_g1,mv,dists){
  const bc=bc_g1*703.07;
  const sorted=[...dists].sort((a,b)=>a-b);
  const drops={},tofs={};
  let x=0,y=0,vx=mv,vy=0,t=0,di=0;
  const dt=0.0005;
  while(di<sorted.length){
    while(di<sorted.length&&x>=sorted[di]){drops[sorted[di]]=y*100;tofs[sorted[di]]=t;di++;}
    if(di>=sorted.length) break;
    const v=Math.sqrt(vx*vx+vy*vy);
    if(v<5) break;
    const ad=RHO*v*v*getCD(v/SOUND)/(2*bc);
    const inv=1/v;
    vx+=-ad*vx*inv*dt;
    vy+=(-G_ACC-ad*vy*inv)*dt;
    x+=vx*dt;y+=vy*dt;t+=dt;
  }
  return {drops,tofs};
}

// Kulfall relativt siktlinje med sikthöjd
// Siktlinje: från (0, +sh) till (zero, boreDrop[zero])
function sdrop(drops,zero,d,sh){
  if(d===zero) return 0;
  const result=drops[d]-sh*(1-d/zero)-drops[zero]*(d/zero);
  return Math.round(result*10)/10;
}

function windDrift(tof,dist,mv,windMs,wf){
  if(windMs===0) return 0;
  return Math.round(windMs*wf*(tof-dist/mv)*100*10)/10;
}

function dcol(v){
  if(v===0) return "#4ade80";
  const a=Math.abs(v);
  if(a<=5) return "#4ade80";
  if(a<=25) return "#facc15";
  if(a<=75) return "#fb923c";
  return "#f87171";
}
function wcol(v){
  if(v===0) return "#94a3b8";
  const a=Math.abs(v);
  if(a<=5) return "#67e8f9";
  if(a<=20) return "#38bdf8";
  if(a<=50) return "#818cf8";
  return "#c084fc";
}
function fmt(v){
  if(v===0) return "±0";
  return (v>0?"+":"")+v.toFixed(1)+" cm";
}

                    {DISP.map(d=>{
                      const drop=sdrop(drops,zero,d,sh);
                      const drift=windDrift(tofs[d]||0,d,row.mvms,windMs,wf);
                      return showWind?(
                        <React.Fragment key={d}>
                          <td style={{fontWeight:"bold",color:d===zero?"#4ade80":dcol(drop),
                            background:d===zero?"rgba(74,222,128,.06)":undefined}}>{fmt(drop)}</td>
                          <td className="wtd" style={{fontWeight:"bold",color:wcol(drift)}}>
                            {drift===0?"±0":Math.abs(drift).toFixed(1)+" cm"}
                          </td>
                        </React.Fragment>
                      ):(
                        <td key={d} style={{fontWeight:"bold",color:d===zero?"#4ade80":dcol(drop),
                          background:d===zero?"rgba(74,222,128,.06)":undefined}}>{fmt(drop)}</td>
                      );
                    })}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
          <div className="card" style={{padding:"14px 16px"}}>
            <div style={{fontFamily:"'Orbitron',monospace",fontSize:10,letterSpacing:".1em",color:"#475569",marginBottom:10}}>FÄRGKODNING</div>
            <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:".06em",marginBottom:6}}>Kulfall relativt siktlinje</div>
            {[{c:"#4ade80",l:"±0 / ≤5 cm"},{c:"#facc15",l:"≤25 cm"},{c:"#fb923c",l:"≤75 cm"},{c:"#f87171",l:">75 cm"}]
              .map(({c,l})=>(
              <div key={c} style={{display:"flex",alignItems:"center",marginBottom:5,fontSize:11}}>
                <span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:c,marginRight:6}}/>
                <span style={{color:"#94a3b8"}}>{l}</span>
              </div>
            ))}
            <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:".06em",marginTop:10,marginBottom:6}}>Vindavdrift</div>
            {[{c:"#67e8f9",l:"≤5 cm"},{c:"#38bdf8",l:"≤20 cm"},{c:"#818cf8",l:"≤50 cm"},{c:"#c084fc",l:">50 cm"}]
              .map(({c,l})=>(
              <div key={c} style={{display:"flex",alignItems:"center",marginBottom:5,fontSize:11}}>
                <span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:c,marginRight:6}}/>
                <span style={{color:"#94a3b8"}}>{l}</span>
              </div>
            ))}
          </div>
          <div style={{background:"rgba(15,23,42,.6)",borderLeft:`3px solid ${cal.color}`,
            padding:"10px 14px",fontSize:11,color:"#64748b",lineHeight:1.8,borderRadius:"0 4px 4px 0"}}>
            <div style={{fontFamily:"'Orbitron',monospace",fontSize:10,letterSpacing:".1em",color:"#475569",marginBottom:8}}>OBSERVERA</div>
            <div>• Kulfall beräknat relativt siktlinje med korrekt sikthöjd</div>
            <div>• Positiv = kulan är ovanför siktlinjen</div>
            <div>• Negativ = kulan är under siktlinjen</div>
            <div>• Kort nollning + snabb kaliber → kulan stiger efter nollningspunkten</div>
            <div>• G1 numerisk integration (dt=0.5ms)</div>
            <div>• Vindavdrift via lag-regeln · 90°=full · 45°=half</div>
            <div>• Nollningskolumn markerad med ◉</div>
            <div>• Validera med din specifika ammunition</div>
          </div>
        </div>

        <div>
          <div style={{fontFamily:"'Orbitron',monospace",fontSize:10,letterSpacing:".15em",
            color:"#475569",marginBottom:10,textTransform:"uppercase"}}>◈ Utgångshastighet — alla laddningar & piplängder</div>
          <div className="card" style={{overflowX:"auto"}}>
            <table className="dt">
              <thead>
                <tr>
                  <th style={{textAlign:"left",paddingLeft:14}}>Kulvikt</th>
                  {cal.bullets[0].barrels.map(b=><th key={b.len} style={{color:"#64748b"}}>{b.len}</th>)}
                </tr>
              </thead>
              <tbody>
                {cal.bullets.map(b=>(
                  <tr key={b.id}>
                    <td style={{textAlign:"left",paddingLeft:14,color:"#94a3b8",fontSize:12}}>{b.weight} {b.type}</td>
                    {b.barrels.map(row=>(
                      <td key={row.len} style={{color:cal.color,opacity:.85}}>{row.mvms} m/s</td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        <div style={{marginTop:28,paddingTop:16,borderTop:"1px solid #1e293b",display:"flex",
          justifyContent:"space-between",fontSize:10,color:"#334155",
          fontFamily:"'Share Tech Mono',monospace",flexWrap:"wrap",gap:8}}>
          <span>G1 numerisk integration · Siktlinje med sikthöjd · Vindavdrift: lag-regel · ISA 15°C</span>
          <span style={{color:"#475569"}}>Validera alltid med din specifika ammunition och nollning</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
